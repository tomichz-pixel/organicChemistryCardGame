    latexA: "\\[ \\text{赤熱した鉄管を通す} \\]",
    note:
    "【解説】：100問目の総括。無機物に近いメタンや炭化カルシウムから、複雑な芳香族や高分子へとつながる有機合成の起点となる反応の一つ。"
  }

let topSel = null, midSel = null, botSel = null;
let lock = false, modalOpen = false;
let miss = 0, match = 0;
let requestedPairCount = 6;
let currentPairCount = 6;

const topArea = document.querySelector('#top');
const midArea = document.querySelector('#mid');
const bottomArea = document.querySelector('#bottom');
const fieldSelect = document.querySelector('#field-select');
const fieldDisp = document.querySelector('#field-disp');
const noticeMsg = document.querySelector('#notice-msg');
const modal = document.querySelector('#modal');
const clearModal = document.querySelector('#clear-modal');
const mt = document.querySelector('#mt');
const txt = document.querySelector('#txt');
const btn = document.querySelector('#btn');
const resetBtn = document.querySelector('#reset-btn');
const retryBtn = document.querySelector('#retry-btn');
const reselectBtn = document.querySelector('#reselect-btn');

function shuffle(a){ return a.sort(() => Math.random() - 0.5); }

function renderMath(targets = null) {
    // 修正：MathJax本体がロードされ、関数が利用可能かまでチェックする
    if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
        if (targets) MathJax.typesetPromise(targets).catch((err) => console.log(err.message));
        else MathJax.typesetPromise().catch((err) => console.log(err.message));
    } else {
        // まだ読み込まれていない場合はログだけ出してクラッシュを防ぐ
        console.warn("MathJaxがまだ読み込まれていません。初回は自動レンダリングを待ちます。");
    }
}

// 改良点：masterDataから一意の分野名を抽出してプルダウンを作成
function initFieldSelect() {
    // 全データからfieldのみを抽出し、Setを使って重複を除去
    const fields = [...new Set(masterData.map(d => d.field))];
    
    fieldSelect.innerHTML = ''; // クリア
    fields.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        fieldSelect.appendChild(opt);
    });
}

function pickRandom(arr, n) {
    let shuffled = shuffle([...arr]);
    return shuffled.slice(0, Math.min(n, arr.length));
}

function createCard(d, areaType){
    let c = document.createElement('div');
    c.className = 'card';
    let wrapper = document.createElement('div'); wrapper.className = 'card-inner-wrapper';
    let i = document.createElement('div'); i.className = 'inner';

    if (areaType === 'Q') {
        let qContent = document.createElement('div');
        qContent.className = 'q-card-content math-text';
        let qStr = d.latexQ.replace(/\\\[|\\\]/g, '').trim();

        if (qStr.includes('\\quad')) {
            let parts = qStr.split('\\quad');
            qContent.innerHTML = `\\( \\displaystyle ${parts[0]} \\) <br> <span style="font-size:0.8em; opacity:0.8;">\\( ${parts[1]} \\)</span>`;
        } else {
            qContent.innerHTML = `\\( \\displaystyle ${qStr} \\)`;
        }

        i.appendChild(qContent); wrapper.appendChild(i); c.appendChild(wrapper);

        c.onclick = () => {
            if(lock || modalOpen || c.classList.contains('matched')) return;
            if (topSel && topSel.c === c) { c.classList.remove('selected'); topSel = null; return; }
            c.classList.add('selected');
            if(topSel) topSel.c.classList.remove('selected');
            topSel = {c, d};
            checkMatch();
        };
        return c;
    }

    let f = document.createElement('div'); f.className = 'front';
    let fText = areaType === 'Key' ? '条件・場 (Key)' : '生成物・法則 (A)';
    f.innerHTML = `${fText}<br><span style="font-size:10px; font-weight:normal;">(Tap)</span>`;

    let b = document.createElement('div'); b.className = 'back'; 
    let cleanA = d.latexA.replace(/\\\[|\\\]/g, '').trim();
    let contentHtml = areaType === 'Key' ? `<span style="font-size:0.9em; font-weight:bold;">${d.key}</span>` : `\\( \\displaystyle ${cleanA} \\)`;
  
    b.innerHTML = `<div class="math-text">${contentHtml}</div>`;
    i.appendChild(f); i.appendChild(b); wrapper.appendChild(i); c.appendChild(wrapper);

    c.onclick = () => {
        if(lock || modalOpen || c.classList.contains('matched')) return;
        if (areaType === 'Key') {
            if (midSel && midSel.c === c) { c.classList.remove('flipped'); midSel = null; return; }
            c.classList.add('flipped'); if(midSel) midSel.c.classList.remove('flipped'); midSel = {c, d};
        } else {
            if (botSel && botSel.c === c) { c.classList.remove('flipped'); botSel = null; return; }
            c.classList.add('flipped'); if(botSel) botSel.c.classList.remove('flipped'); botSel = {c, d};
        }
        checkMatch();
    };
    return c;
}

function checkMatch() {
    if(topSel && midSel && botSel) {
        lock = true;
        setTimeout(() => {
            let isMatch = (topSel.d.id === midSel.d.id) && (midSel.d.id === botSel.d.id);
            let dTarget = topSel.d;
            
            let cleanQ_modal = dTarget.latexQ.replace(/\\\[|\\\]/g, '').trim();
            let cleanA_modal = dTarget.latexA.replace(/\\\[|\\\]/g, '').trim();
            
            let modalBody = `
                <div class="formula-box">
                    \\( \\displaystyle ${cleanQ_modal} \\implies ${cleanA_modal} \\)
                </div>
                <div style="font-size:0.95em; background:#f4f4f4; padding:15px; border-radius:6px; line-height:1.7;">
                    <strong style="color:#0D47A1;">【条件・場】 ${dTarget.key}</strong>
                    <hr style="margin:8px 0; border:none; border-top:1px dashed #ccc;">
                    ${dTarget.note.replace(/\n/g, '<br>')}
                </div>
            `;

            if(isMatch) {
                show('正解！', modalBody, () => {
                    topSel.c.classList.add('matched'); midSel.c.classList.add('matched'); botSel.c.classList.add('matched');
                    match++; resetSelection(); 
                    if(match === currentPairCount) {
                        setTimeout(() => { end(); }, 300);
                    }
                });
            } else {
                miss++; document.getElementById('m').textContent = miss;
                show('ちがうよ', modalBody, () => {
                    topSel.c.classList.remove('selected'); midSel.c.classList.remove('flipped'); botSel.c.classList.remove('flipped');
                    resetSelection();
                });
            }
        }, 600);
    }
}

function resetSelection() { topSel = null; midSel = null; botSel = null; lock = false; }

function show(title, body, cb) {
    modalOpen = true;
    mt.textContent = title;
    txt.innerHTML = body;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
// --- ここから追加 ---
    const modalContent = modal.querySelector('.modal-content');
    // 「問題エリア(#top)」の親要素からの相対的な上端位置 + エリアの高さの半分
    const targetY = topArea.offsetTop + (topArea.offsetHeight / 2);
    modalContent.style.marginTop = targetY + 'px';
    // ------------------
  
    renderMath([txt]);
    btn.onclick = () => { 
        modal.style.display = 'none'; 
        modalOpen = false; 
        document.body.style.overflow = ''; 
        cb(); 
    };
}

function end() {
    document.getElementById('clear-msg').innerHTML = `ミスカウント <b>${miss}</b> 回で全 ${currentPairCount} 組を解き切りました！`;
    clearModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function setupGame() {
    resetSelection(); match = 0; miss = 0;
    document.getElementById('m').textContent = 0;
    clearModal.style.display = 'none';
    document.body.style.overflow = '';

    const selectedField = fieldSelect.value;
    if (!selectedField) return; // データがない場合の安全策

    fieldDisp.textContent = selectedField;

    const radios = document.getElementsByName('pairCount');
    for (let r of radios) if (r.checked) requestedPairCount = parseInt(r.value);

    let fieldFullData = masterData.filter(d => d.field === selectedField);
    currentPairCount = Math.min(requestedPairCount, fieldFullData.length);

    if (currentPairCount < requestedPairCount) {
        noticeMsg.textContent = `※収録数が${currentPairCount}問のため、自動的に${currentPairCount}組で出題します`;
    } else {
        noticeMsg.textContent = '';
    }

    let gameData = pickRandom(fieldFullData, currentPairCount);

    let gridRows = Math.ceil(currentPairCount / 3);
    let rowStyle = `repeat(${gridRows}, 1fr)`;
    [topArea, midArea, bottomArea].forEach(a => a.style.gridTemplateRows = rowStyle);

    topArea.innerHTML = ''; midArea.innerHTML = ''; bottomArea.innerHTML = '';
    shuffle([...gameData]).forEach(d => topArea.appendChild(createCard(d, 'Q')));
    shuffle([...gameData]).forEach(d => midArea.appendChild(createCard(d, 'Key')));
    shuffle([...gameData]).forEach(d => bottomArea.appendChild(createCard(d, 'A')));
    
    renderMath([topArea, midArea, bottomArea]);
}

// -------------------------------------------------------------
// 初期化・イベント登録実行（並べ替え）
// -------------------------------------------------------------

initFieldSelect(); // 選択肢を生成

// 先にすべてのボタンやプルダウンにイベントを登録しておく（安全対策）
fieldSelect.addEventListener('change', () => { setupGame(); });
resetBtn.onclick = () => { setupGame(); };
retryBtn.onclick = () => { setupGame(); };
reselectBtn.onclick = () => {
    clearModal.style.display = 'none';
    document.body.style.overflow = '';
    fieldSelect.focus();
};

const radios = document.getElementsByName('pairCount');
for (let r of radios) r.onchange = () => setupGame();

// 最後にゲームを開始する
setupGame();

})();
</script>
